<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/x-icon" href="{{ '/img/favicon.png' | relative_url }}">
  <title>{{ page.title }} - Pedro Camellon</title>
  
  <script type="text/javascript">
    (function(c,l,a,r,i,t,y){c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);})(window,document,"clarity","script","kykpoeffvx");
  </script>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="text-gray-800">
  <div class="container">
    <header class="d-flex flex-wrap align-items-center justify-content-center justify-content-md-between py-3 mb-4 border-bottom">
      <div class="col-md-3 mb-2 mb-md-0"></div>
      <ul class="nav col-12 col-md-auto mb-2 justify-content-center mb-md-0">
        <li><a href="{{ '/' | relative_url }}" class="nav-link px-4">Home</a></li>
        <li><a href="{{ '/blog.html' | relative_url }}" class="nav-link px-4">Blog</a></li>
        <li><a href="{{ '/projects' | relative_url }}" class="nav-link px-4">Projects</a></li>
        <li><a href="{{ '/#contact' | relative_url }}" class="nav-link px-4">Contact Me</a></li>
      </ul>
      <div class="col-md-3 text-end"></div>
    </header>
  </div>

  <main class="container mb-5">
    <article class="prose prose-lg mx-auto">
      <h1 class="text-4xl font-bold mb-4">{{ page.title }}</h1>
      <p class="text-gray-600 mb-8">{{ page.date | date: "%B %d, %Y" }}</p>
      {{ content }}
    </article>
  </main>

  <footer class="py-4 text-center text-body-secondary bg-body-tertiary border-top border-bottom">
    <p class="text-lg font-semibold">Follow me on</p>
    <ul class="nav justify-content-center">
      <li class="nav-item"><a href="https://github.com/pedropcamellon" target="_blank" class="nav-link px-2 text-body-secondary">Github</a></li>
      <li class="nav-item"><a href="https://www.linkedin.com/in/pedropcamellon/" target="_blank" class="nav-link px-2 text-body-secondary">LinkedIn</a></li>
    </ul>
  </footer>
</body>
</html>
