name: Deploy Dev Preview

on:
  push:
    branches: [dev]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout dev branch
        uses: actions/checkout@v4
        with:
          ref: dev

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
          bundler-cache: true

      - name: Build Jekyll site
        run: |
          gem install jekyll bundler
          bundle install
          bundle exec jekyll build --baseurl "/dev"
        env:
          JEKYLL_ENV: production

      - name: Checkout main branch for deployment
        uses: actions/checkout@v4
        with:
          ref: main
          path: main-branch

      - name: Copy dev build to main branch dev folder
        run: |
          mkdir -p main-branch/dev
          rm -rf main-branch/dev/*
          cp -r _site/* main-branch/dev/

      - name: Commit and push to main
        run: |
          cd main-branch
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dev/
          git diff --staged --quiet || git commit -m "Deploy dev preview [skip ci]"
          git push origin main
