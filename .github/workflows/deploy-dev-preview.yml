name: Deploy Dev Preview

on:
  push:
    branches: [dev]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
          bundler-cache: true

      - name: Build Jekyll
        run: |
          bundle install
          bundle exec jekyll build --baseurl "/dev"

      - uses: actions/checkout@v4
        with:
          ref: main
          path: main-branch
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy to main
        run: |
          mkdir -p main-branch/dev
          rm -rf main-branch/dev/*
          cp -r _site/* main-branch/dev/
          cd main-branch
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dev/
          if ! git diff --staged --quiet; then
            git commit -m "Deploy dev preview [skip ci]"
            git push
          fi
